name: Build & Publish Docker Image

on:
  push:
    branches:
      - main # builds on every push to main (no push to Docker Hub)
    tags:
      - "v*.*.*" # publishes to Docker Hub only on release tags e.g. v1.0.0
  pull_request:
    branches:
      - main # builds on PRs (validates Dockerfile is healthy, no push)

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/chroma-wrapper

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (needed for multi-platform builds) ─
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ───────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub ───────────────────────────
      # Only runs on release tags — not on main pushes or PRs
      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Extract tags from release tag ──────────────────
      # Tag v1.2.3 → produces:
      #   yourname/chroma-wrapper:1.2.3
      #   yourname/chroma-wrapper:1.2
      #   yourname/chroma-wrapper:1
      #   yourname/chroma-wrapper:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # ── 6. Build and push ─────────────────────────────────
      # push=true only on release tags — all other runs just build
      - name: Build and Push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Print image digest ─────────────────────────────
      - name: Print image digest
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "Published ${{ env.IMAGE_NAME }} → ${{ steps.build-push.outputs.digest }}"

      # ── 8. Sync DOCKER_HUB_README.md to Docker Hub ───────
      # Only syncs on release tags
      - name: Update Docker Hub description
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./DOCKER_HUB_README.md
          short-description: "Plug-in vector search for any stack — one container, zero config, production ready."
