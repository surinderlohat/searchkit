services:
  # ── Single service: FastAPI + embedded ChromaDB ────────
  chroma-wrapper:
    build: .
    container_name: chroma-wrapper
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - CHROMA_PERSIST_DIR=/app/chromadb
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - DEFAULT_COLLECTION=default
      - SENTENCE_TRANSFORMERS_HOME=/app/models
      - EMBEDDING_DEVICE=auto # auto-detects GPU if available, falls back to CPU
    volumes:
      - chroma-data:/app/chromadb # vector data
      - model-cache:/app/models # model cache

volumes:
  chroma-data:
  model-cache:
