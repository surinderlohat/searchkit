name: Lint & Format Check

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md" # skip if only markdown files changed
      - "assets/**" # skip if only assets changed
      - "LICENSE" # skip if only license changed
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md" # skip if only markdown files changed
      - "assets/**" # skip if only assets changed
      - "LICENSE" # skip if only license changed

jobs:
  ruff:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Cache pip packages — keyed on requirements.txt hash
          # No re-download unless requirements.txt changes
          cache: "pip"
          cache-dependency-path: requirements.txt

      # Cache ruff itself separately — it rarely changes
      - name: Cache ruff
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ruff-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ruff-${{ runner.os }}-

      - name: Install Ruff
        run: pip install ruff==0.4.9

      # Fails if any formatting issues found
      - name: Check formatting
        run: ruff format app/ --check

      # Fails if any lint issues found
      - name: Check lint
        run: ruff check app/
