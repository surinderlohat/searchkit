services:
  # ── Single service: FastAPI + embedded ChromaDB ────────
  searchkit:
    build: .
    container_name: searchkit
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - CHROMA_PERSIST_DIR=/app/chromadb
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - DEFAULT_COLLECTION=default
      - SENTENCE_TRANSFORMERS_HOME=/app/models
      - EMBEDDING_DEVICE=auto
      - LOG_LEVEL=INFO # INFO | DEBUG | WARNING | ERROR
      - LOG_FORMAT=text # text | json (use json in prod)
      - MEMORY_WARN_MB=3500 # log warning when RAM exceeds this
      - MEMORY_LIMIT_MB=4000 # refuse writes above this
      - API_KEY=your-secret-api-key-here # set a strong key for prod, remove for open access
      - ADMIN_USER=admin # bootstrap admin username
      - ADMIN_PASSWORD=your-admin-password-here # bootstrap admin password
      - SEARCHKIT_DB=/app/data/searchkit.db # SQLite path for users and API keys
    volumes:
      - ./data/chromadb:/app/chromadb # vector DB — directly on host disk
      - ./data/models:/app/models # model cache — directly on host disk
      - ./data:/app/data # SQLite DB for users and API keys
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M
