{# ── Live Logs page ── #}
<div id="page-logs" class="page hidden">
  <h2 class="font-display text-2xl font-bold tracking-tight mb-6">Live Logs <span class="text-brand">·</span> Real-time stream</h2>

  <div class="bg-surface border border-border rounded-xl p-5">
    <div class="flex items-center gap-3 flex-wrap mb-4">
      <div class="flex gap-1.5">
        <button onclick="setFilter('ALL',this)"     class="filter-btn active">ALL</button>
        <button onclick="setFilter('INFO',this)"    class="filter-btn">INFO</button>
        <button onclick="setFilter('WARNING',this)" class="filter-btn">WARN</button>
        <button onclick="setFilter('ERROR',this)"   class="filter-btn">ERROR</button>
        <button onclick="setFilter('DEBUG',this)"   class="filter-btn">DEBUG</button>
      </div>
      <button onclick="clearLogs()"
        class="px-3 py-1 rounded border border-border text-slate-500 text-xs font-mono hover:text-slate-300 transition-colors">
        Clear
      </button>
      <div class="ml-auto flex items-center gap-2 text-xs text-slate-500">
        <span id="sse-dot" class="inline-block w-2 h-2 rounded-full bg-slate-600"></span>
        <span id="sse-label">Connecting…</span>
      </div>
    </div>
    <div id="log-wrap"
      class="bg-[#0a0a0f] border border-border rounded-lg p-4 h-[460px] overflow-y-auto font-mono text-xs leading-relaxed">
    </div>
  </div>
</div>
