name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*" # triggers on version tags like v1.0.0
  pull_request:
    branches:
      - main # builds but does NOT push on PRs (just validates)

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/chroma-wrapper

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (needed for multi-platform builds) ─
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ───────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub ───────────────────────────
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Extract tags and labels ────────────────────────
      #   on main push  → yourname/chroma-wrapper:latest
      #   on tag v1.2.3 → yourname/chroma-wrapper:1.2.3
      #                   yourname/chroma-wrapper:1.2
      #                   yourname/chroma-wrapper:1
      #                   yourname/chroma-wrapper:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # ── 6. Build and push ─────────────────────────────────
      # cache-from / cache-to uses GitHub Actions cache (type=gha)
      # Docker layer cache is keyed on file contents:
      #   - requirements.txt changed → pip layer rebuilds, rest is cached
      #   - only app/ changed        → only app COPY layer rebuilds
      #   - nothing changed          → entire build served from cache instantly
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Print image digest ─────────────────────────────
      - name: Print image digest
        if: github.event_name != 'pull_request'
        run: echo "Published ${{ env.IMAGE_NAME }} → ${{ steps.build-push.outputs.digest }}"
