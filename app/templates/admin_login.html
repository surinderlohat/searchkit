{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-[radial-gradient(ellipse_at_20%_50%,rgba(110,231,183,0.05)_0%,transparent_60%),radial-gradient(ellipse_at_80%_20%,rgba(129,140,248,0.05)_0%,transparent_60%)]">
  <div class="w-full max-w-md bg-surface border border-border rounded-2xl p-10 shadow-[0_0_60px_rgba(110,231,183,0.05)]">

    <h1 class="font-display text-2xl font-extrabold tracking-tight mb-1">
      Search<span class="text-brand">Kit</span>
    </h1>
    <p class="text-slate-500 text-xs mb-8">Admin Dashboard — Sign In</p>

    {% if error %}
    <div class="bg-red-500/10 border border-red-500/30 rounded-lg px-4 py-3 text-red-400 text-sm mb-5">
      ⚠ {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin/login" class="space-y-4">
      <div>
        <label for="username" class="block text-xs text-slate-500 uppercase tracking-widest mb-1.5">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" autofocus
          class="w-full bg-[#0a0a0f] border border-border rounded-lg px-4 py-2.5 text-slate-200 text-sm font-mono outline-none focus:border-brand transition-colors">
      </div>
      <div>
        <label for="password" class="block text-xs text-slate-500 uppercase tracking-widest mb-1.5">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password"
          class="w-full bg-[#0a0a0f] border border-border rounded-lg px-4 py-2.5 text-slate-200 text-sm font-mono outline-none focus:border-brand transition-colors">
      </div>
      <button type="submit"
        class="w-full bg-brand text-[#0a0a0f] font-display font-bold text-base rounded-lg py-3 hover:opacity-90 active:scale-[.99] transition-all mt-2">
        Sign In →
      </button>
    </form>

  </div>
</div>
{% endblock %}
