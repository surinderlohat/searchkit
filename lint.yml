name: Lint & Format Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff==0.4.9

      # Fails if any formatting issues found
      - name: Check formatting
        run: ruff format app/ --check

      # Fails if any lint issues found
      - name: Check lint
        run: ruff check app/
