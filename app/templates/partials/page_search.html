{# ── Search page ── #}
<div id="page-search" class="page hidden">
  <h2 class="font-display text-2xl font-bold tracking-tight mb-6">Search <span class="text-brand">·</span> Test Queries</h2>

  <div class="bg-surface border border-border rounded-xl p-5 mb-4">
    <div class="flex gap-3 flex-wrap mb-4">
      <div class="flex-[3] min-w-48">
        <label class="lbl">Query</label>
        <input type="text" id="search-query" placeholder="Enter your search query…"
          onkeydown="if(event.key==='Enter') runSearch()" class="inp">
      </div>
      <div class="flex-1 min-w-32">
        <label class="lbl">Collection</label>
        <select id="search-collection" class="inp"></select>
      </div>
      <div class="w-20">
        <label class="lbl">Top K</label>
        <input type="number" id="search-topk" value="10" min="1" max="100" class="inp">
      </div>
    </div>
    <button onclick="runSearch()" class="btn-primary">Search →</button>
  </div>

  <div id="search-results"></div>
</div>
