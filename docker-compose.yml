services:

  # ── Single service: FastAPI + embedded ChromaDB ────────
  chroma-wrapper:
    build: .
    container_name: chroma-wrapper
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - CHROMA_PERSIST_DIR=/app/chromadb
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - DEFAULT_COLLECTION=default
    volumes:
      - chroma-data:/app/chromadb   # persist vector data across restarts

volumes:
  chroma-data:
